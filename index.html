<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Időnyerő – AI marketing munkakörnyezet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:        #1C1A17;
  --card:      #242220;
  --primary:   #4A5E4A;
  --accent:    #8FAF8F;
  --text:      #F0EDE8;
  --muted:     #B5A898;
  --border:    rgba(240,237,232,0.08);
  --danger:    #B4635A;
  --radius-card: 10px;
  --radius-btn: 6px;
  --radius-input: 5px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  font-weight:400;
  line-height:1.5;
  min-height:100vh;
}
h1,h2,h3,h4{font-weight:600;margin:0 0 .5em 0;}
p{margin:0 0 .75em 0;}
a{color:inherit;}
button,input,select,textarea{font-family:inherit;font-size:14px;color:var(--text);}
.small-label{font-size:11px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);}
.container{max-width:1180px;margin:0 auto;padding:0 24px;}

/* ---------- Topnav ---------- */
.topnav{
  position:sticky;top:0;z-index:40;
  background:rgba(28,26,23,0.92);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--border);
}
.topnav-inner{display:flex;align-items:center;justify-content:space-between;height:60px;}
.brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:17px;cursor:pointer;}
.brand-mark{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--primary));display:flex;align-items:center;justify-content:center;font-size:13px;}
.nav-links{display:flex;gap:4px;}
.nav-link{padding:8px 14px;border-radius:var(--radius-btn);cursor:pointer;color:var(--muted);font-weight:500;font-size:13px;}
.nav-link:hover{color:var(--text);background:var(--card);}
.nav-link.active{color:var(--text);background:var(--card);}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 16px;border-radius:var(--radius-btn);border:1px solid transparent;
  cursor:pointer;font-weight:500;font-size:13px;transition:opacity .15s ease;
  background:var(--card);color:var(--text);border-color:var(--border);
}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff;}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#16211a;font-weight:600;}
.btn-ghost{background:transparent;border-color:var(--border);}
.btn-danger{background:transparent;border-color:var(--danger);color:var(--danger);}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn-icon{padding:7px 9px;}

/* ---------- Cards / layout ---------- */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);padding:20px;}
.page{padding:32px 0 80px 0;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.grid{display:grid;gap:16px;}
.grid-clients{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}
.grid-blocks{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
.section-title{font-size:13px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);margin:28px 0 12px 0;}
.section-title:first-child{margin-top:0;}

/* ---------- Client card ---------- */
.client-card{position:relative;cursor:pointer;border-left:3px solid var(--project-color,var(--accent));}
.client-card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.client-card-name{font-weight:600;font-size:15px;margin-bottom:4px;}
.client-card-industry{color:var(--muted);font-size:12.5px;}
.star-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;line-height:1;}
.star-btn.starred{color:#D8B14E;}
.client-card-meta{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}

/* ---------- Badges / chips ---------- */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.02em;background:rgba(240,237,232,.08);color:var(--muted);}
.badge-active{color:#9FCB9F;background:rgba(143,175,143,.14);}
.badge-paused{color:#D8B14E;background:rgba(216,177,78,.14);}
.badge-archived{color:var(--muted);background:rgba(181,168,152,.14);}
.badge-trash{color:var(--danger);background:rgba(180,99,90,.14);}
.badge-draft{color:var(--muted);background:rgba(181,168,152,.14);}
.badge-reviewing{color:#D8B14E;background:rgba(216,177,78,.14);}
.badge-approved{color:#9FCB9F;background:rgba(143,175,143,.14);}
.badge-delivered{color:#8FAFC9;background:rgba(122,143,166,.14);}
.chip{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11.5px;background:rgba(240,237,232,.06);color:var(--muted);border:1px solid var(--border);}

/* ---------- Forms ---------- */
.field{margin-bottom:16px;}
.field label{display:block;margin-bottom:6px;}
.input,textarea,select.input{
  width:100%;padding:9px 12px;border-radius:var(--radius-input);
  background:var(--bg);border:1px solid var(--border);color:var(--text);
}
textarea.input{resize:vertical;min-height:80px;}
.input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);}
.checkbox-row{display:flex;align-items:center;gap:8px;}
.checkbox-group{display:flex;flex-wrap:wrap;gap:14px;}
.checkbox-group label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);}
.field-hint{font-size:11.5px;color:var(--muted);margin-top:4px;}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:100;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);width:100%;max-width:560px;padding:28px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}

/* ---------- Tabs / search ---------- */
.tabbar{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:7px 14px;border-radius:var(--radius-btn);cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;border:1px solid transparent;}
.tab.active{background:var(--card);color:var(--text);border-color:var(--border);}
.searchbar{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.searchbar .input{max-width:280px;}

/* ---------- Project header ---------- */
.project-header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:24px;}
.project-dot{width:14px;height:14px;border-radius:50%;background:var(--project-color,var(--accent));flex:none;}
.project-title{font-size:22px;font-weight:600;}
.menu-wrap{position:relative;display:inline-block;}
.dropdown{position:absolute;right:0;top:calc(100% + 6px);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-btn);min-width:190px;box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:50;overflow:hidden;}
.dropdown-item{padding:9px 14px;font-size:13px;cursor:pointer;}
.dropdown-item:hover{background:rgba(240,237,232,.06);}
.dropdown-item.danger{color:var(--danger);}

/* ---------- Block tiles ---------- */
.block-tile{cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:10px;transition:border-color .15s ease;}
.block-tile:hover{border-color:var(--accent);}
.block-tile-icon{width:40px;height:40px;border-radius:8px;background:rgba(143,175,143,.14);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:.02em;}
.block-tile-label{font-size:13.5px;font-weight:500;}

/* ---------- Block list ---------- */
.block-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap;}
.block-row:last-child{border-bottom:none;}
.block-row-main{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.block-row-title{font-weight:500;font-size:13.5px;}
.block-row-date{color:var(--muted);font-size:12px;}
.block-row-actions{display:flex;gap:8px;}

/* ---------- Block editor ---------- */
.block-editor-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.block-editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media (max-width:860px){.block-editor-grid{grid-template-columns:1fr;}}
.panel-title{font-size:12.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.output-empty{color:var(--muted);font-size:13px;padding:24px 0;text-align:center;}
.output-content{font-size:13.5px;line-height:1.65;}
.output-content h1{font-size:18px;}
.output-content h2{font-size:15.5px;margin-top:18px;}
.output-content ul{padding-left:20px;margin:0 0 10px 0;}
.variation-card{border:1px solid var(--border);border-radius:var(--radius-input);padding:12px 14px;margin-bottom:10px;}
.variation-card .vlabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
.variation-card .vtext{white-space:pre-wrap;}
.review-panel{margin-top:18px;border-top:1px solid var(--border);padding-top:14px;}
.review-panel summary{cursor:pointer;font-size:12.5px;color:var(--muted);font-weight:500;}
.review-block{margin-top:10px;padding:12px 14px;background:rgba(240,237,232,.04);border-radius:var(--radius-input);font-size:13px;white-space:pre-wrap;}
.review-agent-label{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
.spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(240,237,232,.2);border-top-color:var(--accent);animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.iframe-preview{width:100%;height:420px;border:1px solid var(--border);border-radius:var(--radius-input);background:#fff;}

/* ---------- Toast ---------- */
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200;}
.toast{background:var(--card);border:1px solid var(--border);padding:12px 16px;border-radius:var(--radius-btn);font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);max-width:320px;}
.toast.error{border-color:var(--danger);color:#f0d3d0;}
.toast.success{border-color:var(--accent);}

/* ---------- Misc ---------- */
.muted{color:var(--muted);}
.text-right{text-align:right;}
.flex{display:flex;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.gap-8{gap:8px;}
.gap-12{gap:12px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.version-select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:var(--radius-btn);font-size:12.5px;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toastWrap"></div>

    document.getElementById('app').innerHTML =

/* ============================================================================
 * ÁLTALÁNOS SEGÉDFÜGGVÉNYEK
 * ==========================================================================*/
function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function el(html){
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}
function formatDate(iso){
  if(!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('hu-HU', {year:'numeric', month:'short', day:'numeric'});
}
function toast(message, type){
  const wrap = document.getElementById('toastWrap');
  const node = el(`<div class="toast ${type==='error'?'error':(type==='success'?'success':'')}">${escapeHtml(message)}</div>`);
  wrap.appendChild(node);
  setTimeout(()=>node.remove(), 4500);
}
function colorForIndex(i){ return PROJECT_COLORS[i % PROJECT_COLORS.length]; }
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
function copyToClipboard(text){
  navigator.clipboard.writeText(text).then(()=>toast('Vágólapra másolva', 'success')).catch(()=>toast('Másolás sikertelen', 'error'));
}
function extractJson(text){
  if(!text) return null;
  let t = text.trim();
  const fence = t.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if(fence) t = fence[1].trim();
  try { return JSON.parse(t); } catch(e){}
  const start = t.indexOf('{'), end = t.lastIndexOf('}');
  if(start >= 0 && end > start){
    try { return JSON.parse(t.slice(start, end+1)); } catch(e){}
  }
  return null;
}
function renderMarkdown(md){
  if(!md) return '';
  const lines = String(md).split(/\r?\n/);
  let html = '', inList = false;
  for(const raw of lines){
    const line = raw.trim();
    if(!line){ if(inList){html+='</ul>'; inList=false;} continue; }
    let m;
    if((m = line.match(/^###\s+(.*)/))){ if(inList){html+='</ul>';inList=false;} html += `<h3>${inlineMd(m[1])}</h3>`; }
    else if((m = line.match(/^##\s+(.*)/))){ if(inList){html+='</ul>';inList=false;} html += `<h2>${inlineMd(m[1])}</h2>`; }
    else if((m = line.match(/^#\s+(.*)/))){ if(inList){html+='</ul>';inList=false;} html += `<h1>${inlineMd(m[1])}</h1>`; }
    else if((m = line.match(/^[-*]\s+(.*)/))){ if(!inList){html+='<ul>';inList=true;} html += `<li>${inlineMd(m[1])}</li>`; }
    else { if(inList){html+='</ul>';inList=false;} html += `<p>${inlineMd(line)}</p>`; }
  }
  if(inList) html += '</ul>';
  return html;
}
function inlineMd(s){
  let t = escapeHtml(s);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  return t;
}
function getPath(obj, path){
  return path.split('.').reduce((acc,k)=> (acc==null? undefined : acc[k]), obj);
}

/* ============================================================================
 * CLAUDE API HÍVÁS (a Supabase Edge Function proxyn keresztül)
 * ==========================================================================*/
async function callClaude({ system, userContent, tools, max_tokens }){
  if(!CONFIG.CLAUDE_PROXY_URL){
    throw new Error('CLAUDE_PROXY_URL nincs beállítva a config.js-ben.');
  }
  let messages = [{ role:'user', content: userContent }];
  let finalData = null;
  for(let i=0; i<4; i++){
    const res = await fetch(CONFIG.CLAUDE_PROXY_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ system, messages, tools, max_tokens: max_tokens || 4000 }),
    });
    const data = await res.json();
    if(!res.ok){
      throw new Error((data && (data.error?.message || data.error)) || 'Claude API hívás sikertelen');
    }
    finalData = data;
    if(data.stop_reason === 'pause_turn'){
      messages = messages.concat([{ role:'assistant', content: data.content }]);
      continue;
    }
    break;
  }
  const textBlocks = (finalData.content || []).filter(b=>b.type==='text').map(b=>b.text);
  return { raw: finalData, text: textBlocks.join('\n\n') };
}

async function exportMarkdownAsDocx(filename, title, markdown, metaDescription){
  const children = [ new docx.Paragraph({ text: title || 'Időnyerő dokumentum', heading: docx.HeadingLevel.TITLE }) ];
  if(metaDescription){
    children.push(new docx.Paragraph({ children:[ new docx.TextRun({ text:'Meta leírás: '+metaDescription, italics:true }) ] }));
  }
  const lines = String(markdown||'').split(/\r?\n/);
  for(const raw of lines){
    const line = raw.trim();
    if(!line){ children.push(new docx.Paragraph({ text:'' })); continue; }
    if(line.startsWith('## ')) children.push(new docx.Paragraph({ text: line.slice(3), heading: docx.HeadingLevel.HEADING_2 }));
    else if(line.startsWith('### ')) children.push(new docx.Paragraph({ text: line.slice(4), heading: docx.HeadingLevel.HEADING_3 }));
    else if(line.startsWith('# ')) children.push(new docx.Paragraph({ text: line.slice(2), heading: docx.HeadingLevel.HEADING_1 }));
    else if(line.startsWith('- ') || line.startsWith('* ')) children.push(new docx.Paragraph({ text: line.slice(2), bullet:{ level:0 } }));
    else children.push(new docx.Paragraph({ text: line }));
  }
  const document = new docx.Document({ sections:[{ children }] });
  const blob = await docx.Packer.toBlob(document);
  downloadBlob(blob, filename + '.docx');
}
function exportHtmlFile(filename, htmlContent){
  const blob = new Blob([htmlContent || ''], { type:'text/html' });
  downloadBlob(blob, filename + '.html');
}

const app = document.getElementById('app');

function parseHash(){
  const raw = location.hash.replace(/^#\/?/, '');
  const [pathPart, queryPart] = raw.split('?');
  const parts = pathPart.split('/').filter(Boolean).map(decodeURIComponent);
  const query = new URLSearchParams(queryPart || '');
  return { parts, query };
}
function navigate(hash){ location.hash = hash; }

window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', route);

async function route(){
  const { parts, query } = parseHash();
  try{
    if(parts.length === 0){ await renderDashboard(); return; }
    if(parts[0] === 'standalone' && parts.length === 1){ await renderBlockPicker(null); return; }
    if(parts[0] === 'standalone' && parts.length === 2){ await renderBlockEditor(null, parts[1], query.get('id')); return; }
    if(parts[0] === 'client' && parts.length === 2){ await renderProjectView(parts[1]); return; }
    if(parts[0] === 'client' && parts.length === 3 && parts[2] === 'edit'){ await renderClientEdit(parts[1]); return; }
    if(parts[0] === 'client' && parts.length === 4 && parts[2] === 'block'){ await renderBlockEditor(parts[1], parts[3], query.get('id')); return; }
    await renderDashboard();
  } catch(err){
    console.error(err);
    app.innerHTML = `<div class="container page"><div class="card"><h2>Hiba történt</h2><p class="muted">${escapeHtml(err.message||String(err))}</p></div></div>`;
  }
}

async function cleanupExpiredTrash(){
  try{
    const all = await DB.listClients();
    const cutoff = Date.now() - 30*24*60*60*1000;
    const toDelete = all.filter(c=> c.status==='trash' && c.trashed_at && new Date(c.trashed_at).getTime() < cutoff);
    for(const c of toDelete){ await DB.deleteClient(c.id); }
  } catch(e){ console.warn('Trash cleanup failed', e); }
}

      ${['active','paused','archived','trash'].map(k=>`<div class="tab ${dashboardState.tab===k?'active':''}" data-tab="${k}">${CLIENT_STATUS_LABELS[k]}</div>`).join('')}
    </div>

    <div class="section-title">${starred.length? 'Egyéb' : CLIENT_STATUS_LABELS[dashboardState.tab]}</div>

const onboardingInProgress = new Set();

async function runOnboarding(client){
  onboardingInProgress.add(client.id);
  try{
    const userMsg = `Ügyfél neve: ${client.name}\nIparág: ${client.industry}\nWeboldal: ${client.website}\nCélcsoport: ${client.target_audience||'-'}\n\nVégezd el a teljes publikus digitális lábnyom kutatást a rendszerpromptban leírt lépések szerint, majd add vissza a JSON összefoglalót.`;
    const { text } = await callClaude({
      system: AGENT_PROMPTS.onboarding,
      userContent: userMsg,
      tools: [
        { type:'web_search_20260209', name:'web_search' },
        { type:'web_fetch_20260209', name:'web_fetch' },
      ],
      max_tokens: 8000,
    });
    const parsed = extractJson(text) || { summary: text, keywords:[], competitors:[], strengths:[], weaknesses:[], focus_areas:[] };
    await DB.createProjectContext({
      client_id: client.id,
      scraped_data: null,
      summary: parsed.summary || '',
      keywords: parsed.keywords || [],
      competitors: parsed.competitors || [],
      strengths: parsed.strengths || [],
      weaknesses: parsed.weaknesses || [],
      focus_areas: parsed.focus_areas || [],
    });
    toast('Projekt kontextus elkészült: ' + client.name, 'success');
  } catch(err){
    console.error(err);
    toast('Kontextus gyűjtés sikertelen: ' + (err.message||err), 'error');
  } finally{
    onboardingInProgress.delete(client.id);
    const { parts } = parseHash();
    if(parts[0]==='client' && parts[1]===client.id && parts.length===2){ await renderProjectView(client.id); }
  }
}

  const ctx = await DB.getProjectContext(client.id);
  const blocks = await DB.listBlocks(client.id);
  const doneBlocks = blocks.filter(b=>b.content);
  const previousBlocksText = doneBlocks.slice(0,8).map(b=> `${BLOCK_TYPES[b.type]?.label||b.type} (${formatDate(b.created_at)})`).join('; ');
  const seoAudit = doneBlocks.find(b=>b.type==='seo_audit');
  const seoKeywords = (seoAudit && seoAudit.content && seoAudit.content.keywords) || (ctx && ctx.keywords) || [];
  return {
    client, summary: ctx?.summary || '', keywords: ctx?.keywords || [], competitors: ctx?.competitors || [],
    strengths: ctx?.strengths || [], weaknesses: ctx?.weaknesses || [], focus_areas: ctx?.focus_areas || [],
    previousBlocksText, seoKeywords, blocks, hasContext: !!ctx,
  };
}

function statusMenuHtml(client){
  const items = [];
  if(client.status !== 'trash'){
    if(client.status !== 'active') items.push({k:'active', label:'Aktiválás'});
    if(client.status !== 'paused') items.push({k:'paused', label:'Szüneteltetés'});
    if(client.status !== 'archived') items.push({k:'archived', label:'Archiválás'});
    items.push({k:'trash', label:'Kukába helyezés', danger:true});
  } else {
    items.push({k:'active', label:'Visszaállítás'});
    items.push({k:'__delete', label:'Végleges törlés', danger:true});
  }
  return items.map(i=>`<div class="dropdown-item ${i.danger?'danger':''}" data-status="${i.k}">${i.label}</div>`).join('');
}

function resolvePrefill(prefillPath, client, context){
  if(!prefillPath) return '';
  if(prefillPath.startsWith('client.')){
    const v = client ? getPath(client, prefillPath.slice(7)) : null;
    return Array.isArray(v) ? v.join(', ') : (v||'');
  }
  if(prefillPath === 'context.keywords') return context ? (context.keywords||[]).join(', ') : '';
  if(prefillPath === 'context.competitors') return context ? (context.competitors||[]).join('\n') : '';
  if(prefillPath === 'context.seoKeyword') return context && context.seoKeywords && context.seoKeywords[0] ? context.seoKeywords[0] : '';
  return '';
}

function inputFieldHtml(field, value){
  const id = 'f_' + field.key;
  if(field.type === 'select'){
    return `<div class="field"><label>${field.label}</label>
      <select class="input" id="${id}" name="${field.key}">
        ${field.options.map(o=>`<option value="${escapeHtml(o)}" ${value===o?'selected':''}>${escapeHtml(o)}</option>`).join('')}
      </select></div>`;
  }
  if(field.type === 'checkbox'){
    return `<div class="field checkbox-row"><input type="checkbox" id="${id}" name="${field.key}" ${value?'checked':''}> <label for="${id}" style="margin:0;">${field.label}</label></div>`;
  }
  if(field.type === 'number'){
    return `<div class="field"><label>${field.label}</label><input type="number" class="input" id="${id}" name="${field.key}" value="${value!=null?value:(field.default||'')}" min="${field.min||''}" max="${field.max||''}"></div>`;
  }
  if(field.type === 'textarea'){
    return `<div class="field"><label>${field.label}</label><textarea class="input" id="${id}" name="${field.key}" placeholder="${escapeHtml(field.placeholder||'')}">${escapeHtml(value||'')}</textarea>${field.hint?`<div class="field-hint">${escapeHtml(field.hint)}</div>`:''}</div>`;
  }
  if(field.type === 'csvfile'){
    return `<div class="field"><label>${field.label}</label>
      <input type="file" class="input" id="${id}_file" accept=".csv,text/csv">
      <textarea class="input" id="${id}" name="${field.key}" style="margin-top:8px;" placeholder="…vagy illeszd be kézzel az adatokat">${escapeHtml(value||'')}</textarea>
    </div>`;
  }
  return `<div class="field"><label>${field.label}</label><input class="input" id="${id}" name="${field.key}" placeholder="${escapeHtml(field.placeholder||'')}" value="${escapeHtml(value||'')}"></div>`;
}

function renderOutputContent(type, content){
  if(!content) return `<div class="output-empty">Még nincs generált tartalom. Töltsd ki a bal oldali mezőket, majd kattints a Generálás gombra.</div>`;
  if(type === 'meta_copy'){
    return (content.variations||[]).map((v,i)=>`
      <div class="variation-card">
        <div class="vlabel">Variáció ${i+1}</div>
        <div class="vtext"><strong>Headline:</strong> ${escapeHtml(v.headline)}</div>
        <div class="vtext"><strong>Primary text:</strong> ${escapeHtml(v.primary_text)}</div>
        <div class="vtext"><strong>Description:</strong> ${escapeHtml(v.description)}</div>
        <button class="btn btn-ghost btn-sm" style="margin-top:8px;" data-copy-variation="${i}">Másolás</button>
      </div>`).join('');
  }
  if(type === 'ads_copy'){
    const section = (label, items) => `<div class="variation-card"><div class="vlabel">${label}</div>${(items||[]).map(t=>`<div class="vtext">${escapeHtml(t)}</div>`).join('')}</div>`;
    return section('Headlines (30 kar.)', content.headlines) + section('Long headlines (90 kar.)', content.long_headlines) + section('Descriptions (90 kar.)', content.descriptions);
  }
  if(type === 'landing_page'){
    return `<iframe class="iframe-preview" sandbox="allow-scripts" srcdoc="${escapeHtml(content.html||'')}"></iframe>`;
  }
  // markdown-alapú blokkok: campaign_strategy, campaign_optimization, seo_audit, blog_post, competitor_analysis
  let extra = '';
  if(content.title) extra += `<h1>${escapeHtml(content.title)}</h1>`;
  if(content.meta_description) extra += `<p class="muted"><em>Meta leírás: ${escapeHtml(content.meta_description)}</em></p>`;
  return `<div class="output-content">${extra}${renderMarkdown(content.markdown||'')}</div>`;
}

function getExportPlainText(type, content){
  if(type === 'meta_copy'){
    return (content.variations||[]).map((v,i)=>`Variáció ${i+1}\nHeadline: ${v.headline}\nPrimary text: ${v.primary_text}\nDescription: ${v.description}`).join('\n\n');
  }
  if(type === 'ads_copy'){
    return `Headlines:\n${(content.headlines||[]).join('\n')}\n\nLong headlines:\n${(content.long_headlines||[]).join('\n')}\n\nDescriptions:\n${(content.descriptions||[]).join('\n')}`;
  }
  return content.markdown || '';
}

function drawBlockEditor(state){
  const { clientId, client, context, blockType, block, versions, agentOutputs, generating } = state;
  const cfg = BLOCK_TYPES[blockType];
  const body = document.getElementById('pageBody');
  const inputValues = block.input || {};

  const backHref = clientId ? `#/client/${clientId}` : '#/standalone';
  const content = state.viewingVersion ? state.viewingVersion.content : block.content;

  body.innerHTML = `
    <div class="block-editor-header">
      <div class="flex gap-12" style="align-items:center;">
        <button class="btn btn-ghost btn-sm" data-nav="${backHref}">&larr; Vissza</button>
        <h1 style="margin:0;">${cfg.label}</h1>
        <span class="badge badge-${block.status}">${generating && block.status==='reviewing' ? 'Agent ellenőrzés alatt' : BLOCK_STATUS_LABELS[block.status]}</span>
      </div>
      <div class="flex gap-8">
        ${versions.length ? `<select class="version-select" id="versionSelect">
          <option value="">Aktuális verzió</option>
          ${versions.map(v=>`<option value="${v.id}" ${state.viewingVersion?.id===v.id?'selected':''}>v${v.version_number} – ${formatDate(v.saved_at)}</option>`).join('')}
        </select>` : ''}
        ${state.viewingVersion ? `<button class="btn btn-ghost btn-sm" id="restoreBtn">Visszaállítás</button>` : ''}
      </div>
    </div>

    <div class="block-editor-grid">
      <div class="card">
        <div class="panel-title">Input</div>
        <form id="blockForm">
          ${cfg.inputs.map(f=> inputFieldHtml(f, inputValues[f.key] !== undefined ? inputValues[f.key] : (f.prefill ? resolvePrefill(f.prefill, client, context) : f.default))).join('')}
          <button type="submit" class="btn btn-accent" id="genBtn" ${generating?'disabled':''}>
            ${generating ? '<span class="spinner"></span> Generálás…' : (block.content ? 'Újragenerálás' : 'Generálás')}
          </button>
        </form>
      </div>

      <div class="card">
        <div class="flex-between">
          <div class="panel-title">AI Output</div>
          ${content ? `<div class="flex gap-8">
            ${cfg.exportFormat==='copy' ? `<button class="btn btn-ghost btn-sm" id="copyAllBtn">Összes másolása</button>` : ''}
            ${cfg.exportFormat==='docx' ? `<button class="btn btn-ghost btn-sm" id="exportBtn">Export (.docx)</button>` : ''}
            ${cfg.exportFormat==='html' ? `<button class="btn btn-ghost btn-sm" id="exportBtn">Export (.html)</button>` : ''}
            ${!state.viewingVersion && !generating && block.status==='reviewing' ? `<button class="btn btn-primary btn-sm" id="approveBtn">Jóváhagyás</button>` : ''}
            ${!state.viewingVersion && !generating && block.status==='approved' ? `<button class="btn btn-ghost btn-sm" id="deliverBtn">Leszállítottnak jelöl</button>` : ''}
          </div>` : ''}
        </div>
        <div id="outputArea">${renderOutputContent(blockType, content)}</div>

        ${(!state.viewingVersion && agentOutputs.filter(a=>cfg.reviewAgents.includes(a.agent_type)).length) ? `
        <details class="review-panel" open>
          <summary>Agent ellenőrzés (${agentOutputs.filter(a=>cfg.reviewAgents.includes(a.agent_type)).length})</summary>
          ${agentOutputs.filter(a=>cfg.reviewAgents.includes(a.agent_type)).map(a=>`
            <div class="review-block">
              <div class="review-agent-label">${a.agent_type}</div>
              ${escapeHtml(a.output)}
            </div>`).join('')}
        </details>` : ''}
      </div>
    </div>
  `;
  wireNav(body);

  if(body.querySelector('#versionSelect')){
    body.querySelector('#versionSelect').addEventListener('change', (e)=>{
      const vid = e.target.value;
      const v = versions.find(x=>x.id===vid) || null;
      drawBlockEditor({ ...state, viewingVersion: v });
    });
  }
  if(body.querySelector('#restoreBtn')){
    body.querySelector('#restoreBtn').addEventListener('click', async ()=>{
      const restoredContent = state.viewingVersion.content;
      const nextVersion = (versions[0]?.version_number || 0) + 1;
      await DB.createVersion(block.id, nextVersion, restoredContent, `Visszaállítva: v${state.viewingVersion.version_number}`);
      const updatedBlock = await DB.updateBlock(block.id, { content: restoredContent });
      const updatedVersions = await DB.listVersions(block.id);
      toast('Verzió visszaállítva', 'success');
      drawBlockEditor({ ...state, block: updatedBlock, versions: updatedVersions, viewingVersion:null });
    });
  }
  if(body.querySelector('#copyAllBtn')){
    body.querySelector('#copyAllBtn').addEventListener('click', ()=> copyToClipboard(getExportPlainText(blockType, content)));
  }
  body.querySelectorAll('[data-copy-variation]').forEach(btn=> btn.addEventListener('click', ()=>{
    const i = Number(btn.getAttribute('data-copy-variation'));
    const v = content.variations[i];
    copyToClipboard(`Headline: ${v.headline}\nPrimary text: ${v.primary_text}\nDescription: ${v.description}`);
  }));
  if(body.querySelector('#exportBtn')){
    body.querySelector('#exportBtn').addEventListener('click', async ()=>{
      const filenameBase = (client?.name || 'idonyero') + '-' + blockType;
      if(cfg.exportFormat === 'docx'){
        await exportMarkdownAsDocx(filenameBase, content.title || cfg.label, content.markdown, content.meta_description);
      } else if(cfg.exportFormat === 'html'){
        exportHtmlFile(filenameBase, content.html);
      }
    });
  }
  if(body.querySelector('#approveBtn')){
    body.querySelector('#approveBtn').addEventListener('click', async ()=>{
      const updated = await DB.updateBlock(block.id, { status:'approved' });
      toast('Blokk jóváhagyva', 'success');
      drawBlockEditor({ ...state, block: updated });
    });
  }
  if(body.querySelector('#deliverBtn')){
    body.querySelector('#deliverBtn').addEventListener('click', async ()=>{
      const updated = await DB.updateBlock(block.id, { status:'delivered' });
      toast('Blokk megjelölve leszállítottként', 'success');
      drawBlockEditor({ ...state, block: updated });
    });
  }

  // CSV fájl beolvasás (campaign_optimization)
  cfg.inputs.filter(f=>f.type==='csvfile').forEach(f=>{
    const fileInput = body.querySelector('#f_'+f.key+'_file');
    if(fileInput){
      fileInput.addEventListener('change', ()=>{
        const file = fileInput.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = () => { body.querySelector('#f_'+f.key).value = reader.result; };
        reader.readAsText(file);
      });
    }
  });

  body.querySelector('#blockForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const inputData = {};
    cfg.inputs.forEach(f=>{
      if(f.type==='checkbox') inputData[f.key] = fd.get(f.key) === 'on';
      else inputData[f.key] = fd.get(f.key);
    });
    await DB.updateBlock(block.id, { input: inputData, status:'reviewing' });
    drawBlockEditor({ ...state, block: { ...block, input: inputData, status:'reviewing' }, generating:true, viewingVersion:null });
    await runBlockGeneration({ clientId, client, context, blockType, blockId: block.id, inputData });
  });
}

async function runBlockGeneration({ clientId, client, context, blockType, blockId, inputData }){
  const cfg = BLOCK_TYPES[blockType];
  try{
    const userMessage = cfg.inputs.map(f=>{
      let v = inputData[f.key];
      if(f.type==='checkbox') v = v ? 'igen' : 'nem';
      return `${f.label}: ${v || '-'}`;
    }).join('\n');

    const system = buildSystemPrompt(cfg.agentType, context);
    const { text } = await callClaude({ system, userContent: userMessage, max_tokens: 8000 });
    const parsedContent = extractJson(text) || { markdown: text };

    await DB.createAgentOutput(blockId, cfg.agentType, inputData, text);

    const versions = await DB.listVersions(blockId);
    const nextVersion = (versions[0]?.version_number || 0) + 1;
    await DB.createVersion(blockId, nextVersion, parsedContent, null);
    await DB.updateBlock(blockId, { content: parsedContent });

    // Ellenőrző agentsek sorban lefutnak
    for(const reviewerType of cfg.reviewAgents){
      try{
        const reviewInput = typeof parsedContent === 'object' ? JSON.stringify(parsedContent, null, 2) : String(parsedContent);
        const { text: reviewText } = await callClaude({
          system: AGENT_PROMPTS[reviewerType],
          userContent: `Ellenőrizendő tartalom (${cfg.label}):\n\n${reviewInput}`,
          max_tokens: 2000,
        });
        await DB.createAgentOutput(blockId, reviewerType, { source: cfg.agentType }, reviewText);
      } catch(reviewErr){
        console.warn('Reviewer agent failed', reviewerType, reviewErr);
      }
    }

    toast('Generálás kész', 'success');
  } catch(err){
    console.error(err);
    toast('Generálás sikertelen: ' + (err.message||err), 'error');
    await DB.updateBlock(blockId, { status:'draft' });
  } finally{
    const freshBlock = await DB.getBlock(blockId);
    const freshVersions = await DB.listVersions(blockId);
    const freshOutputs = await DB.listAgentOutputs(blockId);
    drawBlockEditor({ clientId, client, context, blockType, block: freshBlock, versions: freshVersions, agentOutputs: freshOutputs, viewingVersion:null, generating:false });
  }
}

/* Induló útvonal feldolgozása */
route();
</script>
